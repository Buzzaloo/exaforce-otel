name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Install Builder
      run: go install go.opentelemetry.io/collector/cmd/builder@v0.114.0

    - name: Build Collector
      run: |
        ~/go/bin/builder --config builder-config.yaml
        chmod +x ./dist/exaforce-otel
        mv ./dist/exaforce-otel ./exaforce-otel-linux-amd64

    - name: Create Checksum
      run: sha256sum exaforce-otel-linux-amd64 > exaforce-otel-linux-amd64.sha256

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: exaforce-otel-linux-amd64
        path: |
          exaforce-otel-linux-amd64
          exaforce-otel-linux-amd64.sha256

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: '**/*'
        body: |
          ## Exaforce OpenTelemetry Collector
          
          **Components:**
          - Receivers: syslog, windowseventlog, filelog
          - Processors: memory_limiter, batch, resourcedetection, transform, filter
          - Exporters: awss3, httpjson, debug
          
          **Download:** exaforce-otel-linux-amd64
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
