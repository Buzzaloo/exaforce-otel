name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Debug - Show structure
      run: |
        echo "=== Repository structure ==="
        ls -la
        echo ""
        echo "=== httpjsonexporter structure ==="
        ls -la exporter/httpjsonexporter/
        echo ""
        echo "=== builder-config.yaml ==="
        cat builder-config.yaml
        echo ""
        echo "=== go.mod files ==="
        find . -name go.mod -exec echo "--- {} ---" \; -exec cat {} \;

    - name: Install Builder
      run: |
        go install go.opentelemetry.io/collector/cmd/builder@v0.95.0
        echo "Builder installed at: $(which builder)"
        ~/go/bin/builder version || true

    - name: Build Collector
      run: |
        echo "Running builder..."
        ~/go/bin/builder --config builder-config.yaml --verbose || {
          echo "Build failed, showing logs..."
          find . -name "*.log" -exec cat {} \; || true
          exit 1
        }

    - name: Check output
      if: success()
      run: |
        ls -la ./dist/
        file ./dist/exaforce-otel
        chmod +x ./dist/exaforce-otel
        ./dist/exaforce-otel version || true

    - name: Package binary
      if: success()
      run: |
        mv ./dist/exaforce-otel ./exaforce-otel-linux-amd64
        sha256sum exaforce-otel-linux-amd64 > exaforce-otel-linux-amd64.sha256

    - name: Upload Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: exaforce-otel-linux-amd64
        path: |
          exaforce-otel-linux-amd64
          exaforce-otel-linux-amd64.sha256

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: '**/*'
        body: |
          ## Exaforce OpenTelemetry Collector
          
          **Components:**
          - Receivers: syslog, windowseventlog, filelog
          - Processors: memory_limiter, batch, resourcedetection, transform, filter
          - Exporters: awss3, httpjson, debug
          
          **Download:** exaforce-otel-linux-amd64
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
