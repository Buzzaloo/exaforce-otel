name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  build-linux:
    name: Build Linux AMD64
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Install Builder
      run: go install go.opentelemetry.io/collector/cmd/builder@v0.95.0

    - name: Build Collector
      run: |
        ~/go/bin/builder --config builder-config.yaml
        chmod +x ./dist/exaforce-otel
        mv ./dist/exaforce-otel ./exaforce-otel-linux-amd64

    - name: Create Checksum
      run: sha256sum exaforce-otel-linux-amd64 > exaforce-otel-linux-amd64.sha256

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: exaforce-otel-linux-amd64
        path: |
          exaforce-otel-linux-amd64
          exaforce-otel-linux-amd64.sha256

  build-windows:
    name: Build Windows AMD64
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Install Builder
      run: go install go.opentelemetry.io/collector/cmd/builder@v0.95.0

    - name: Build Collector for Windows
      env:
        GOOS: windows
        GOARCH: amd64
      run: |
        ~/go/bin/builder --config builder-config.yaml
        # Builder creates the binary without .exe, we need to add it
        if [ -f ./dist/exaforce-otel ]; then
          mv ./dist/exaforce-otel ./exaforce-otel-windows-amd64.exe
        elif [ -f ./dist/exaforce-otel.exe ]; then
          mv ./dist/exaforce-otel.exe ./exaforce-otel-windows-amd64.exe
        fi

    - name: Create Checksum
      run: sha256sum exaforce-otel-windows-amd64.exe > exaforce-otel-windows-amd64.exe.sha256

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: exaforce-otel-windows-amd64
        path: |
          exaforce-otel-windows-amd64.exe
          exaforce-otel-windows-amd64.exe.sha256

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download All Artifacts
      uses: actions/download-artifact@v4

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          **/*
        body: |
          ## Exaforce OpenTelemetry Collector
          
          Custom collector with components for Exaforce deployments.
          
          **Components:**
          - Receivers: syslog, windowseventlog, filelog
          - Processors: memory_limiter, batch, resourcedetection, transform, filter
          - Exporters: awss3, httpjson (custom), debug
          
          **Downloads:**
          - Windows: `exaforce-otel-windows-amd64.exe`
          - Linux: `exaforce-otel-linux-amd64`
          
          **Usage:**
          ```yaml
          receivers:
            windowseventlog:
              channel: Security
          
          processors:
            batch: {}
          
          exporters:
            httpjson:
              endpoint: "https://hooks.exaforce.com/ingest/YOUR_ID"
              bearer_token: "YOUR_TOKEN"
          
          service:
            pipelines:
              logs:
                receivers: [windowseventlog]
                processors: [batch]
                exporters: [httpjson]
          ```
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
